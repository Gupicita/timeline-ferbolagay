<!DOCTYPE html>
<!-- build: montos al bloque + titulos de bloque + compactar + items limpios (v4) -->
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Timeline FerBolagay</title>
<style>
:root{
  --bg:#0f1115;--panel:#181b22;--panel2:#1f232c;--line:#2a2f3a;
  --txt:#e7e9ee;--muted:#9aa3b2;--accent:#6c8cff;--accent2:#4a6bff;
  --done:#39d98a;--prog:#f5b544;--todo:#7a8296;--danger:#ff6b6b;--chip:#262b36;
  --trueque:#c08bff;--cash:#5ec8ff;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45}
header{position:sticky;top:0;z-index:20;background:#12151bee;border-bottom:1px solid var(--line);
  padding:10px 18px;backdrop-filter:blur(6px)}
.hrow{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
h1{font-size:15px;margin:0;font-weight:650}
h1 span{color:var(--muted);font-weight:400;font-size:12px}
.spacer{flex:1}
input,select,button,textarea{font-family:inherit;font-size:13px;color:var(--txt);
  background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer;transition:.15s}button:hover{border-color:var(--accent)}
button.ghost{background:transparent}button.danger:hover{border-color:var(--danger);color:var(--danger)}
button.primary{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:600}
.tabs{display:flex;gap:6px;margin-top:10px}
.tab{padding:7px 16px;border-radius:8px 8px 0 0;background:transparent;border:1px solid transparent;
  color:var(--muted);font-weight:600;cursor:pointer}
.tab.active{color:var(--txt);background:var(--panel);border-color:var(--line);border-bottom-color:var(--panel)}
.wrap{max-width:900px;margin:0 auto;padding:18px}
.search{min-width:160px}

/* checklist */
.proj{margin-bottom:18px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.proj-h{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;background:var(--panel2)}
.proj-h h2{font-size:14px;margin:0;font-weight:650;flex:1}
.proj-h .caret{color:var(--muted);transition:.2s}
.proj.collapsed .caret{transform:rotate(-90deg)}
.proj.collapsed .items{display:none}
.proj-h .pm{font-size:12px;color:var(--muted)}
.items{display:flex;flex-direction:column}
.block{border-top:1px solid var(--line);border-left:3px solid #2f3542;background:#15181f}
.block.bdone{border-left-color:var(--done)}
.block-h{display:flex;align-items:center;gap:9px;padding:7px 14px;background:#1a1e26;flex-wrap:wrap;cursor:pointer}
.block-h:hover{background:#1d222b}
.bcaret{color:var(--muted);font-size:11px;transition:.2s;flex-shrink:0}
.block.bcollapsed .bcaret{transform:rotate(-90deg)}
.block.bcollapsed .block-items{display:none}
.block-title{background:transparent;border:1px solid transparent;border-radius:6px;padding:3px 8px;color:var(--txt);
  font-size:13px;font-weight:600;min-width:120px;max-width:260px}
.block-title::placeholder{color:#5a6474;font-weight:400}
.block-title:hover{border-color:var(--line)}
.block-title:focus{border-color:var(--accent);background:var(--panel2);outline:none}
.block-price{font-size:12px;color:var(--muted)}.block-price b{color:var(--cash)}.block-price .tq{color:var(--trueque)}
.spc2{flex:1}
.bstat{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;background:#2b3040;color:var(--prog);white-space:nowrap}
.bstat.done{background:#173026;color:var(--done)}
.block-items{display:flex;flex-direction:column}
.block-items .item:first-child{border-top:none}
tr.pending td{color:var(--muted)}
.item{border-top:1px solid var(--line)}
.item-row{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer}
.item-row:hover{background:#1c202a}
.item-row.dragging{opacity:.4}
.item-row.drop-before{box-shadow:inset 0 3px 0 var(--accent)}
.item-row.drop-after{box-shadow:inset 0 -3px 0 var(--accent)}
.drag{color:#5a6474;cursor:grab;font-size:15px;flex-shrink:0;user-select:none;line-height:1}
.drag:active{cursor:grabbing}
.additem{margin:6px 14px 12px;background:transparent;border:1px dashed var(--line);color:var(--muted);
  border-radius:8px;padding:9px;width:calc(100% - 28px);text-align:center;font-weight:600}
.additem:hover{border-color:var(--accent);color:var(--accent)}
.detbtns{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:12px;border-top:1px dashed var(--line);padding-top:12px}
.detbtns .spc{flex:1}
.mini{padding:5px 10px;font-size:12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--todo);flex-shrink:0}
.dot.prog{background:var(--prog)}.dot.entregado{background:var(--done)}
.item-title{flex:1;font-weight:550}
.blk{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;letter-spacing:.3px}
.chip-tr{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;
  background:#2a1f3a;color:var(--trueque)}
.chip-cash{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;
  background:#0e2c3a;color:var(--cash)}
.item-date{font-size:12px;color:var(--muted);white-space:nowrap}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
.pill.todo{background:#2b3040;color:var(--todo)}
.pill.prog{background:#3a2f14;color:var(--prog)}
.pill.entregado{background:#173026;color:var(--done)}
.price-tag{font-size:12px;color:var(--cash);font-weight:600;white-space:nowrap;min-width:52px;text-align:right}
.price-tag.trueque{color:var(--trueque)}
.icaret{color:var(--muted);font-size:11px;transition:.2s}
.item.open .icaret{transform:rotate(90deg)}
.detail{display:none;padding:4px 16px 16px 34px;background:#14171e;border-top:1px dashed var(--line)}
.item.open .detail{display:block}
.drow{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin:12px 0}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:auto}
.dur input{width:64px}.delay input{width:60px}.money-in{width:96px}
.delay{display:flex;gap:6px;align-items:flex-end}
.subgroup{margin-top:12px}
.subgroup h4{margin:0 0 5px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.sub{display:flex;gap:8px;align-items:center;padding:2px 0;font-size:13px}
.sub input[type=checkbox]{accent-color:var(--done);cursor:pointer;flex-shrink:0}
.subtext{flex:1;background:transparent;border:1px solid transparent;border-radius:6px;padding:4px 7px;color:var(--txt);font-size:13px}
.subtext:hover{border-color:var(--line)}
.subtext:focus{border-color:var(--accent);background:var(--panel2)}
.sub.done .subtext{text-decoration:line-through;color:var(--muted)}
.sub .sd{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.subdel{background:transparent;border:none;color:#5a6474;cursor:pointer;font-size:12px;padding:2px 6px;flex-shrink:0}
.subdel:hover{color:var(--danger)}
.subadd{margin-top:4px;background:transparent;border:1px dashed var(--line);color:var(--muted);border-radius:7px;padding:5px 9px;font-size:11px;font-weight:600}
.subadd:hover{border-color:var(--accent);color:var(--accent)}
.notesbox{margin-top:12px}
.notesbox label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px}
.notesbox textarea{width:100%;min-height:46px;resize:vertical;background:var(--panel2);border:1px solid var(--line);
  border-radius:8px;color:var(--txt);padding:8px;font-family:inherit;font-size:13px}
.notesbox textarea:focus{border-color:var(--accent);outline:none}
.priceline{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-top:12px;
  border-top:1px dashed var(--line);padding-top:12px}
.cashnote{font-size:12px;color:var(--muted)}.cashnote b{color:var(--cash)}
.chip-mix{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;
  background:#241f36;color:#b6a0ff}
.price-tag.mix{color:#b6a0ff}
.toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);user-select:none;cursor:pointer}
.moved{color:var(--prog);font-size:11px}

/* cuenta */
.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.scard{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.scard .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.scard .v{font-size:26px;font-weight:700;margin-top:4px}
.scard.bal .v.debe{color:var(--danger)}.scard.bal .v.favor{color:var(--done)}.scard.bal .v.aldia{color:var(--muted)}
.scard .sub2{font-size:11px;color:var(--muted);margin-top:3px}
.sec{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.sec h3{margin:0 0 10px;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;
  letter-spacing:.4px;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid #21252e}
td.amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
tr.settled td{color:var(--muted)}
.tag{font-size:10px;padding:1px 7px;border-radius:999px;background:var(--chip);color:var(--muted);margin-left:6px}
.tag.tr{color:var(--trueque);background:#2a1f3a}
tr.settled td.amt{color:var(--trueque)}
.cl{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;white-space:nowrap}
.cl.fer{background:#123028;color:#5fd6a4}
.cl.cfo{background:#1a2540;color:#7fa8ff}
.payrow input{padding:5px 8px}
.payadd{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:10px}
.iconbtn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px}
.iconbtn:hover{color:var(--danger)}
.muted{color:var(--muted)}.right{text-align:right}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent2);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;z-index:50}
.toast.show{opacity:1}
.hidden{display:none}

/* login */
.overlay{position:fixed;inset:0;z-index:100;background:#0b0d12;display:flex;align-items:center;justify-content:center;padding:20px}
.login{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;width:100%;max-width:360px}
.login h2{margin:0 0 4px;font-size:18px}
.login p{margin:0 0 18px;color:var(--muted);font-size:13px}
.login label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 5px}
.login input{width:100%;padding:11px 12px;font-size:15px}
.login button{width:100%;margin-top:18px;padding:12px}
.login .err{color:var(--danger);font-size:12px;margin-top:10px;min-height:14px}

/* sync status + user chip */
.who{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.syncdot{width:8px;height:8px;border-radius:50%;background:var(--todo)}
.syncdot.on{background:var(--done)}.syncdot.off{background:var(--danger)}.syncdot.local{background:var(--prog)}
.uchip{background:var(--chip);border-radius:999px;padding:3px 10px;font-weight:600;color:var(--txt)}

/* historial */
.hist{display:flex;flex-direction:column;gap:0}
.hitem{display:flex;gap:12px;align-items:baseline;padding:10px 12px;border-bottom:1px solid #21252e}
.hitem:hover{background:#1c202a}
.hwhen{font-size:11px;color:var(--muted);white-space:nowrap;width:120px;flex-shrink:0}
.hwho{font-weight:650;white-space:nowrap;flex-shrink:0}
.hflag{margin-right:5px}
.hcountry{font-size:11px;color:var(--muted);margin-left:4px}
.haction{flex:1;color:var(--txt)}
.hempty{padding:30px;text-align:center;color:var(--muted)}
.hfilter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="login">
    <h2>Timeline FerBolagay</h2>
    <p>Ingresá la clave y tu nombre para ver y editar el plan compartido.</p>
    <label>Tu nombre</label>
    <input id="lg-name" placeholder="ej: Bupi, Gonza, Fer…" autocomplete="off"/>
    <label>Clave</label>
    <input id="lg-pass" type="password" placeholder="clave de acceso" autocomplete="off"/>
    <button class="primary" id="lg-btn">Entrar</button>
    <div class="err" id="lg-err"></div>
  </div>
</div>
<header>
  <div class="hrow">
    <h1>Timeline FerBolagay <span>· gestor de tareas y cuenta</span></h1>
    <div class="spacer"></div>
    <div class="who"><span class="syncdot" id="syncdot"></span><span id="syncmsg">…</span>
      <span class="uchip" id="uchip"></span></div>
    <input class="search" id="search" placeholder="Buscar…"/>
    <label class="toggle"><input type="checkbox" id="cascade" checked/> Auto-empujar</label>
    <button class="ghost" id="compact" title="Compactar / expandir bloques">⊟ Bloques</button>
    <button class="ghost" id="expcsv">CSV</button>
    <button class="ghost" id="expjson">JSON</button>
    <button class="ghost danger" id="reset">Reiniciar</button>
  </div>
  <div class="tabs">
    <div class="tab active" data-tab="crono">Cronograma</div>
    <div class="tab" data-tab="cuenta">Cuenta de Fer</div>
    <div class="tab" data-tab="historial">Historial</div>
  </div>
</header>
<div class="wrap">
  <div id="crono"></div>
  <div id="cuenta" class="hidden"></div>
  <div id="historial" class="hidden"></div>
</div>
<div class="toast" id="toast"></div>

/* dates */
function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmt(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addDays(s,n){const d=pd(s);if(!d)return s;d.setDate(d.getDate()+n);return fmt(d);}
function diffDays(a,b){return Math.round((pd(a)-pd(b))/86400000);}
function pretty(s){const d=pd(s);if(!d)return '—';return d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'2-digit'});}

function money(s){if(s==null)return null;const m=String(s).replace(/[^0-9.,-]/g,'').replace(/,/g,'');const v=parseFloat(m);return isNaN(v)?null:v;}

function shiftFollowing(t,n){if(!n)return;tasks.forEach(x=>{if(x.etapa===t.etapa&&x.order>t.order){x.start=addDays(x.start,n);x.due=addDays(x.due,n);}});}
function setStart(t,v){const d=diffDays(v,t.start);t.start=v;t.due=addDays(v,t.duration-1);if(cascadeOn())shiftFollowing(t,d);logChange('Cambió inicio de "'+t.titulo+'" → '+v+(cascadeOn()&&d?' (empujó '+d+'d las siguientes del grupo)':''));commit();}
function setDue(t,v){const old=t.due;t.due=v;t.duration=Math.max(1,diffDays(v,t.start)+1);const d=diffDays(v,old);if(cascadeOn())shiftFollowing(t,d);logChange('Cambió entrega de "'+t.titulo+'" → '+v+(cascadeOn()&&d?' (empujó '+d+'d las siguientes del grupo)':''));commit();}
function setDur(t,v){v=Math.max(1,parseInt(v)||1);const old=t.due;t.duration=v;t.due=addDays(t.start,v-1);const d=diffDays(t.due,old);if(cascadeOn())shiftFollowing(t,d);logChange('Cambió duración de "'+t.titulo+'" a '+v+' días');commit();}

/* structural: reorder / add / delete  -> reflow contiguous dates */
function renumber(){[...tasks].sort((a,b)=>a.order-b.order).forEach((t,i)=>t.order=i);}
function reflow(){
  // re-chain contiguous dates INDEPENDENTLY per group (etapa); groups never affect each other
  const byEtapa={};
  tasks.forEach(t=>{(byEtapa[t.etapa]=byEtapa[t.etapa]||[]).push(t);});
  Object.values(byEtapa).forEach(arr=>{
    arr.sort((a,b)=>a.order-b.order);
    if(!arr.length)return;
    const anchor=arr.reduce((m,t)=>(t.start&&(!m||t.start<m))?t.start:m,null);
    arr[0].start=anchor||arr[0].start||fmt(new Date());
    arr[0].due=addDays(arr[0].start,arr[0].duration-1);
    for(let i=1;i<arr.length;i++){

  dragged.order=target.order+(before?-0.5:0.5);

  const o=t.order;t.order=other.order;other.order=o;
  t.etapa=other.etapa;
  logChange((dir<0?'Subió':'Bajó')+' "'+t.titulo+'" (recalculó fechas)');
  structuralCommit();
}
function addItem(etapa){
  const maxId=tasks.reduce((m,t)=>Math.max(m,t.id),0);
  const grp=tasks.filter(t=>t.etapa===etapa).sort((a,b)=>a.order-b.order);
  const afterOrder=grp.length?grp[grp.length-1].order:(tasks.length?Math.max(...tasks.map(t=>t.order)):-1);
  const nt={id:maxId+1,etapa,bloque:'',semana:'',titulo:'Nueva tarea',
    start:'',due:'',duration:7,done:false,status:'todo',settled:false,
    price:'',valini:'',valpost:'',pago:'',details:[],order:afterOrder+0.5};
  tasks.push(nt);openItems[nt.id]=true;
  logChange('Añadió ítem nuevo a '+shortProj(etapa));
  structuralCommit();toast('Ítem añadido');
}
function deleteItem(t){
  if(!confirm('¿Eliminar "'+t.titulo+'"? Esta acción recalcula las fechas siguientes.'))return;
  const i=tasks.findIndex(x=>x.id===t.id);
  if(i>=0)tasks.splice(i,1);
  logChange('Eliminó "'+t.titulo+'"');
  structuralCommit();toast('Ítem eliminado');
}

/* status of item */
function stItem(t){return t.status||'todo';}

/* ---------- bloques: el precio es POR BLOQUE ---------- */
// agrupa ítems consecutivos con el mismo bloque (ya ordenados)
function chunkBlocks(items){
  const out=[];let cur=null;
  items.forEach(t=>{const b=t.bloque||'';if(!cur||cur.bloque!==b){cur={bloque:b,items:[]};out.push(cur);}cur.items.push(t);});
  return out;
}
// suma precios/efectivo/trueque del bloque y su completitud
function blockAgg(items){
  let price=0,cash=0,tq=0,hasPrice=false;
  items.forEach(t=>{const p=money(t.price);if(p!=null){hasPrice=true;price+=p;}const c=cashOwed(t);if(c!=null)cash+=c;tq+=truequeAmt(t);});
  const doneCount=items.filter(t=>stItem(t)==='entregado').length;
  return {price,cash,tq,hasPrice,doneCount,total:items.length,done:items.length>0&&doneCount===items.length};
}

/* ---------- render ---------- */
function render(){
  document.getElementById('crono').classList.toggle('hidden',tab!=='crono');

}

function renderCrono(){
  document.getElementById('crono').classList.remove('hidden');
  document.getElementById('cuenta').classList.add('hidden');
  const q=document.getElementById('search').value.toLowerCase().trim();
  const root=document.getElementById('crono');root.innerHTML='';
  const list=[...tasks].sort((a,b)=>a.order-b.order).filter(t=>{
    if(!q)return true;return (t.titulo+' '+t.details.map(d=>d.text).join(' ')).toLowerCase().includes(q);
  });
  if(!list.length){root.innerHTML='<div class="muted" style="padding:30px;text-align:center">Sin resultados.</div>';return;}
  const groups=[],seen={};
  list.forEach(t=>{if(!seen[t.etapa]){seen[t.etapa]=[];groups.push(t.etapa);}seen[t.etapa].push(t);});
  groups.forEach(g=>{
    const gt=seen[g], dn=gt.filter(t=>stItem(t)==='entregado').length;
    const pj=document.createElement('div');pj.className='proj'+(collapsed[g]?' collapsed':'');
    pj.innerHTML=`<div class="proj-h" data-g="${esc(g)}">

      <span class="pm">${dn}/${gt.length} entregados</span></div>
      <div class="items"></div>
      <button class="additem" data-addto="${esc(g)}">+ Añadir ítem a ${esc(g)}</button>`;
    const box=pj.querySelector('.items');

    pj.querySelector('[data-addto]').addEventListener('click',()=>addItem(g));

  });
}

function blockEl(blk){
  const agg=blockAgg(blk.items);
  const bc=blockColor(blk.bloque);
  const etapa=blk.items[0]?blk.items[0].etapa:'';
  const key=blockKey(etapa,blk.bloque);

  const wrap=document.createElement('div');
  wrap.className='block'+(agg.done?' bdone':'')+(isColl?' bcollapsed':'');
  const priceInfo = (agg.hasPrice||agg.tq>0)
    ? `<span class="block-price">${fm(agg.price)}${agg.cash>0?` · <b>${fm(agg.cash)}</b> efvo`:''}${agg.tq>0?` · <span class="tq">${fm(agg.tq)} trueque</span>`:''}</span>`
    : '';
  const stat = blk.bloque
    ? (agg.done?`<span class="bstat done">✓ completo</span>`:`<span class="bstat">${agg.doneCount}/${agg.total}</span>`)
    : '';
  wrap.innerHTML=`<div class="block-h">

      ${blk.bloque?`<span class="blk" style="background:${bc.bg};color:${bc.fg}">${esc(blk.bloque)}</span>`:'<span class="muted" style="font-size:11px">sin bloque</span>'}
      <input class="block-title" data-btitle placeholder="Título del bloque…" value="${esc(blockTitle(etapa,blk.bloque))}"/>
      ${priceInfo}<span class="spc2"></span>${stat}

  });
  const ti=wrap.querySelector('[data-btitle]');
  let bwas=blockTitle(etapa,blk.bloque);
  ti.addEventListener('input',e=>{if(!STATE.blockTitles)STATE.blockTitles={};STATE.blockTitles[key]=e.target.value;save();});
  ti.addEventListener('change',e=>{if(e.target.value!==bwas){logChange('Tituló bloque '+(blk.bloque||'')+' → "'+e.target.value+'"');bwas=e.target.value;save();}});
  return wrap;
}

function blockColor(b){
  if(!b)return null;
  const m=/(\d+)/.exec(b);
  if(!m)return {bg:'#343a42',fg:'#aab2c0'};        // no número (ej. XMAS BREAK) -> gris neutro
  const n=parseInt(m[1]), maxN=6;                   // B0..B6
  const t=Math.min(n,maxN)/maxN;                    // 0 (claro) -> 1 (oscuro)
  const hue=262, sat=52, light=82-t*50;             // 82% -> 32%
  const bg=`hsl(${hue},${sat}%,${light}%)`;
  const fg = light>56 ? 'hsl(262,60%,20%)' : 'hsl(262,65%,92%)';
  return {bg,fg};
}
/* trueque parcial: parte se salda por trueque, el resto es efectivo cobrable */
function truequeAmt(t){
  if(t.truequeAmount!==undefined&&t.truequeAmount!==null&&String(t.truequeAmount).trim()!=='')return money(t.truequeAmount)||0;
  return t.settled?(money(t.price)||0):0;   // compat con datos viejos (checkbox saldado)
}
function truequeVal(t){
  if(t.truequeAmount!==undefined&&t.truequeAmount!==null&&String(t.truequeAmount).trim()!=='')return t.truequeAmount;
  return t.settled?(t.price||''):'';
}
function cashOwed(t){const p=money(t.price);if(p==null)return null;return Math.max(0,p-truequeAmt(t));}

/* sub-tareas: agregar / borrar */
function addSub(t,label){t.details.push({label:label,text:'Nueva sub-tarea',done:false,date:null});
  logChange('Añadió sub-tarea ('+label+') en "'+t.titulo+'"');commit();}
function delSub(t,i){if(!t.details[i])return;t.details.splice(i,1);
  logChange('Eliminó sub-tarea de "'+t.titulo+'"');commit();}

  });
  root.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    const p=STATE.payments[+b.dataset.del]||{};
    logChange('Eliminó pago '+(money(p.amount)!=null?fm(money(p.amount)):''));
    STATE.payments.splice(+b.dataset.del,1);save();renderCuenta();}));
  root.querySelector('#np-add').addEventListener('click',()=>{
    const a=root.querySelector('#np-amount').value;
    if(!money(a)){toast('Ingresá un monto');return;}
    const note=root.querySelector('#np-note').value;
    STATE.payments.push({date:root.querySelector('#np-date').value||fmt(new Date()),amount:a,note});
    logChange('Agregó pago '+fm(money(a))+(note?' ('+note+')':''));
    save();renderCuenta();toast('Pago agregado');
  });
}
function shortProj(e){return e.replace(/^\d+-\s*/,'');}
function typeOf(e){e=(e||'').toLowerCase();
  if(e.includes('marca'))return 'Marca';
  if(e.includes('web')||e.includes('sitio'))return 'Web';
  if(e.includes('assets'))return 'Assets';
  return shortProj(e);}
function clientOf(e){return /tuscfo/i.test(e||'')?'TusCFO':'Fer';}

/* ---------- historial ---------- */
function flag(cc){if(!cc||cc.length!==2)return '🏳️';try{return String.fromCodePoint(...[...cc.toUpperCase()].map(c=>127397+c.charCodeAt(0)));}catch(e){return '🏳️';}}
function histWhen(ts){const d=new Date(ts);return d.toLocaleString('es-ES',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function renderHistorial(){
  const root=document.getElementById('historial');
  const q=document.getElementById('search').value.toLowerCase().trim();
  let h=[...(STATE.history||[])].reverse();
  if(q)h=h.filter(e=>((e.name||'')+' '+(e.action||'')+' '+(e.country||'')).toLowerCase().includes(q));
  root.innerHTML=`<div class="sec"><h3>Historial de cambios ${sync.mode!=='server'?'· local (no compartido)':''} <span class="muted" style="font-weight:400">— ${STATE.history?STATE.history.length:0} registros</span></h3>
    <div class="hist">${h.length?h.map(e=>`
      <div class="hitem">
        <span class="hwhen">${histWhen(e.ts)}</span>
        <span class="hwho">${esc(e.name||'—')}<span class="hcountry">${e.country?flag(e.country)+' '+esc(e.country):''}</span></span>
        <span class="haction">${esc(e.action||'')}</span>
      </div>`).join(''):'<div class="hempty">Todavía no hay cambios registrados.</div>'}</div></div>`;
}

/* ---------- sync layer ---------- */
const CLIENT_PASS='FER-BYG';
function setSyncUI(mode){
  const dot=document.getElementById('syncdot'),msg=document.getElementById('syncmsg');
  if(!dot)return;
  if(sync.mode!=='server'){dot.className='syncdot local';msg.textContent='Local (no compartido)';return;}
  if(mode==='off'){dot.className='syncdot off';msg.textContent='Sin conexión';}
  else{dot.className='syncdot on';msg.textContent='En vivo';}
}
async function apiGet(){
  const r=await fetch('/api/data',{headers:{'x-app-pass':session.pass}});
  return r.json();
}
async function apiPost(entries){
  const body={password:session.pass,name:session.name,tasks:STATE.tasks,payments:STATE.payments,blockTitles:STATE.blockTitles,entries};
  const r=await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json','x-app-pass':session.pass},body:JSON.stringify(body)});
  if(r.status===403){throw new Error('403');}
  return r.json();
}
function scheduleSync(){
  if(sync.mode!=='server'){
    if(pendingEntries.length){
      const now=Date.now();
      pendingEntries.splice(0).forEach(e=>STATE.history.push({ts:now,name:session.name||'local',country:session.country||'',action:e.action}));
      STATE.history=STATE.history.slice(-800);cacheLocal();
      if(tab==='historial')renderHistorial();
    }
    return;
  }
  sync.dirty=true;clearTimeout(sync.pushTimer);sync.pushTimer=setTimeout(pushSync,900);
}
async function pushSync(){
  if(sync.mode!=='server'||sync.busy)return;
  sync.busy=true;
  const entries=pendingEntries.splice(0,pendingEntries.length);
  let okFlag=false;
  try{
    const res=await apiPost(entries);
    if(res&&res.ok){sync.version=res.version;STATE.history=res.history||STATE.history;sync.dirty=false;okFlag=true;
      setSyncUI('on');cacheLocal();if(tab==='historial')renderHistorial();}
    else{pendingEntries.unshift(...entries);setSyncUI('off');}
  }catch(e){pendingEntries.unshift(...entries);setSyncUI('off');}
  sync.busy=false;
  if(!okFlag&&sync.mode==='server'){clearTimeout(sync.retry);sync.retry=setTimeout(pushSync,3000);}
}
function startPoll(){
  clearInterval(sync.poll);
  sync.poll=setInterval(async()=>{
    if(sync.mode!=='server'||sync.busy||sync.dirty||pendingEntries.length)return;
    try{const res=await apiGet();
      if(res&&res.ok&&res.configured!==false&&(res.version||0)>sync.version){
        setState(res);cacheLocal();render();toast('Actualizado con cambios de otros');}
      setSyncUI('on');
    }catch(e){setSyncUI('off');}
  },6000);
  window.addEventListener('focus',()=>{
    if(sync.mode==='server'&&!sync.dirty&&!pendingEntries.length&&!sync.busy){
      apiGet().then(res=>{if(res&&res.ok&&(res.version||0)>sync.version){setState(res);cacheLocal();render();}}).catch(()=>{});
    }
  });
}
function detectCountry(){
  fetch('https://ipwho.is/?fields=country_code').then(r=>r.json()).then(j=>{if(j&&j.country_code)session.country=j.country_code;}).catch(()=>{});
}

/* ---------- login / boot ---------- */
function showApp(){document.getElementById('overlay').style.display='none';
  document.getElementById('uchip').textContent=session.name||'';}
function bootLocal(){
  const local=loadLocal();
  setState(local||{tasks:initTasks(ORIGINAL),payments:[],history:[]});
  setSyncUI('local');
}
async function enter(errEl){
  detectCountry();
  let res=null;
  try{res=await apiGet();}catch(e){res=null;}
  if(res&&res.ok===false){ if(errEl)errEl.textContent='Clave incorrecta.'; session.pass=''; return; }
  if(!res||res.configured===false){
    if(session.pass!==CLIENT_PASS){ if(errEl)errEl.textContent='Clave incorrecta.'; session.pass=''; return; }
    sync.mode='local';sessionStorage.setItem(SESKEY,JSON.stringify(session));
    bootLocal();showApp();render();
    toast(res?'Modo local: almacenamiento aún no conectado':'Sin conexión: modo local');
    return;
  }
  // server ok + pass valid
  sync.mode='server';sessionStorage.setItem(SESKEY,JSON.stringify(session));
  if(res.empty){
    const local=loadLocal();
    setState(local||{tasks:initTasks(ORIGINAL),payments:[],history:[]});
    pendingEntries.push({action:'Inició el plan compartido'});
    await pushSync();
  }else{setState(res);}
  cacheLocal();showApp();setSyncUI('on');startPoll();render();
}
async function doLogin(){
  const name=document.getElementById('lg-name').value.trim();
  const pass=document.getElementById('lg-pass').value;
  const err=document.getElementById('lg-err');
  if(!name){err.textContent='Poné tu nombre.';return;}
  if(!pass){err.textContent='Poné la clave.';return;}
  session.name=name;session.pass=pass;err.textContent='Entrando…';
  await enter(err);
}
function boot(){
  try{const s=JSON.parse(sessionStorage.getItem(SESKEY)||'null');if(s&&s.pass&&s.name){session=s;}}catch(e){}
  if(session.pass&&session.name){enter();}
}

/* ---------- exports ---------- */
function exportJSON(){dl('timeline_ferbolagay.json',JSON.stringify(STATE,null,2),'application/json');}
function exportCSV(){
  const rows=[['id','proyecto','bloque','titulo','inicio','duracion','entrega','estado','saldado','precio']];
  [...tasks].sort((a,b)=>a.order-b.order).forEach(t=>rows.push([t.id,t.etapa,t.bloque,t.titulo,t.start,t.duration,t.due,STLABEL[stItem(t)],t.settled?'sí':'no',t.price]));
  rows.push([]);rows.push(['PAGOS DE FER']);rows.push(['fecha','monto','nota']);
  STATE.payments.forEach(p=>rows.push([p.date,p.amount,p.note]));
  const csv=rows.map(r=>r.map(c=>{c=String(c==null?'':c);return /[",\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(',')).join('\n');
  dl('timeline_ferbolagay.csv','﻿'+csv,'text/csv');
}
function dl(n,c,t){const b=new Blob([c],{type:t}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);toast('Descargado '+n);}

function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* wiring */
document.getElementById('search').addEventListener('input',()=>{if(tab==='crono')renderCrono();else if(tab==='historial')renderHistorial();});
document.getElementById('expjson').addEventListener('click',exportJSON);
document.getElementById('expcsv').addEventListener('click',exportCSV);
document.getElementById('reset').addEventListener('click',()=>{
  if(!confirm('¿Reiniciar tareas y pagos a los datos originales? Esto afecta a todos. El historial se conserva.'))return;
  setState({tasks:initTasks(ORIGINAL),payments:[],blockTitles:STATE.blockTitles,history:STATE.history,version:sync.version});
  logChange('Reinició el plan a los datos originales');save();render();toast('Reiniciado');
});
document.getElementById('compact').addEventListener('click',()=>{
  const keys=[];[...new Set(tasks.map(t=>t.etapa))].forEach(e=>{
    const items=tasks.filter(t=>t.etapa===e).sort((a,b)=>a.order-b.order);
    chunkBlocks(items).forEach(blk=>keys.push(blockKey(e,blk.bloque)));});
  const anyOpen=keys.some(k=>!blockCollapsed[k]);
  keys.forEach(k=>blockCollapsed[k]=anyOpen);
  if(tab!=='crono'){tab='crono';document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='crono'));}
  render();
});
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  tab=b.dataset.tab;render();}));
document.getElementById('crono').addEventListener('click',e=>{
  const h=e.target.closest('.proj-h');if(h){collapsed[h.dataset.g]=!collapsed[h.dataset.g];renderCrono();}});
document.getElementById('lg-btn').addEventListener('click',doLogin);
document.getElementById('lg-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('lg-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('lg-pass').focus();});
boot();
</script>
